name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev luarocks libssl-dev pkg-config

      - name: Install Lua dependencies
        run: sudo make deps

      - name: Build
        run: make build

      - name: Run tests
        run: make test
