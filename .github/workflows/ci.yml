name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install dependencies
        run: |
          make deps
          echo "$(luarocks path --bin)" >> $GITHUB_PATH

      - name: Build
        run: make build

      - name: Run tests
        run: make test
