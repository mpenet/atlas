name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: atlas-macos-arm64
          - os: macos-13
            artifact: atlas-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install lua openssl pkg-config luarocks

      - name: Install Lua dependencies
        run: |
          luarocks install fennel
          luarocks install lunajson
          luarocks install luasocket
          luarocks install luasec

      - name: Build binary
        run: make binary FENNEL=fennel

      - name: Stage artifact
        run: cp bin/atlas-bin ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Linux binary via Docker
        run: |
          docker buildx build --output type=local,dest=dist/ .
          cp dist/atlas-linux-x86_64 atlas-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: atlas-linux-x86_64
          path: atlas-linux-x86_64

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: atlas-*
          generate_release_notes: true
